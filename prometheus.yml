global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ishemalink-production'
    environment: 'rwanda-datacenter'

scrape_configs:
  - job_name: 'ishemalink-api'
    static_configs:
      - targets: ['web:8000']
    metrics_path: '/api/ops/metrics/'
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
